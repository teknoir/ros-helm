---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: ros
  namespace: default
spec:
  repo: https://teknoir.github.io/ros-helm
  chart: ros
  version: 0.0.0-beta.22
  targetNamespace: default
  valuesContent: |-
    defaults:
      image:
        tag: jazzy-20260401-140825

    instances:
      - name: talker
        nodeSelector:
          node-role: ros
        commands:
          - ros2 run demo_nodes_cpp talker
      - name: listener
        nodeSelector:
          node-role: sim
        commands:
          - ros2 run demo_nodes_py listener
    
      - name: foxglove-bridge
        nodeSelector:
          node-role: ros
        commands:
          - ros2 launch foxglove_bridge foxglove_bridge_launch.xml use_sim_time:=True port:=8765
        nodePorts:
          - name: http-fg-bridge
            port: 8765
            targetPort: 8765
            nodePort: 31765
    
      - name: play-kitti-bag
        nodeSelector:
          node-role: sim
        commands:
          - ros2 bag play bags/kitti_2011_09_26_drive_0002_synced_rosbag_v2 --loop
        artifacts:
          - name: kitti-bag
            image: us-docker.pkg.dev/teknoir/gcr.io/ros-kitti-bag
            tag: jazzy-20260125-212526
    
      - name: turtlebot3-simulation
        nodeSelector:
          node-role: sim
        commands:
          - export TURTLEBOT3_MODEL=waffle_pi
          # This dummy subscriber tricks Gazebo into waking up the camera topic!
          - ros2 topic hz /camera/image_raw/compressed > /dev/null &    
          - ros2 launch tb3_headless_launch tb3_house_headless.launch.py use_sim_time:=True
        artifacts:
          - name: tb3-headless
            image: us-docker.pkg.dev/teknoir/gcr.io/ros-tb3-headless
            tag: jazzy-20260127-093113

      - name: turtlebot3-slam
        nodeSelector:
          node-role: ros
        commands:
          - export TURTLEBOT3_MODEL=waffle_pi
          - ros2 launch turtlebot3_cartographer cartographer.launch.py use_sim_time:=True

      - name: isaac-sim
        nodeSelector:
          node-role: sim
        image:
          registry: us-docker.pkg.dev/teknoir/gcr.io/nviros-humanoid
          tag: jazzy-20260205-154417    
        nviros: true
        commands:
          - ./runheadless.sh -v