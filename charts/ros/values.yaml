instances:
  - name: talker
    commands:
      - ros2 run demo_nodes_cpp talker
  - name: listener
    commands:
      - ros2 run demo_nodes_py listener

# Values possible for ROS instances
defaults:
  image:
    repository: ghcr.io/teknoir/ros-helm/ros2
    tag: latest
  replicas: 1
  resources: {}
  nodeSelector: {}
  hostWorkspacePath: /opt/teknoir/ros/default_ws
  commands:
    - ros2 run demo_nodes_cpp talker
  # K8s NodePort range is typically 30000-32767
  # e.g., nodePorts:
  #        - name: http-fg-bridge
  #          port: 8765
  #          targetPort: 8765
  #          nodePort: 31765
  nodePorts: []


  # NVIROS
  nviros: false
  hostIsaacSimPath: /opt/teknoir/ros/default-isaac-sim

  # Hidden settings for ROS instances

  # domainId can be used to set the ROS_DOMAIN_ID environment variable
  # e.g., domainId: 1

  # artifacts can be used to specify init containers for pre-loading data
  # e.g., artifacts:
  #         - name: custom-artifact
  #           image: us-docker.pkg.dev/teknoir/gcr.io/custom-artifact
  #           tag: latest
  #           commands:
  #             - echo "Downloading custom artifact..."

# Zenoh Router: replaces the Fast DDS Discovery Server.
# Uses TCP (port 7447) instead of UDP, making it far more reliable in Kubernetes.
# nviros (Isaac Sim) instances automatically get a zenoh-bridge-ros2dds sidecar
# that bridges their Fast DDS traffic onto the Zenoh network.
zenohRouter:
  enabled: true
  image:
    repository: ghcr.io/teknoir/ros-helm/zenoh-router
    tag: latest
  replicas: 1
  resources: {}
  nodeSelector: {}
  ports:
    zenoh: 7447      # TCP: native Zenoh protocol (ROS nodes, inter-router peering)
    websocket: 10000 # WebSocket: remote_api plugin (browser clients, Foxglove, web integrations)
    rest: 8000       # HTTP: REST plugin for pub/sub via GET/PUT
  # DDS bridge sidecar injected into nviros pods to bridge Isaac Sim DDS traffic to Zenoh
  ddsBridge:
    image:
      repository: eclipse/zenoh-bridge-ros2dds
      tag: latest
    resources: {}
