---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ros2k8s.fullname" . }}-ros
  labels:
    app.kubernetes.io/name: {{ include "ros2k8s.fullname" . }}
    app.kubernetes.io/component: ros
spec:
  replicas: {{ .Values.ros.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ros2k8s.fullname" . }}
      app.kubernetes.io/component: ros
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ros2k8s.fullname" . }}
        app.kubernetes.io/component: ros
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ros
          image: {{ .Values.ros.image | quote }}
          imagePullPolicy: IfNotPresent
          args:
  {{- toYaml .Values.ros.args | nindent 12 }}
          env:
            # Point ROS 2 nodes at the in-cluster Discovery Server service.
            # Fast DDS supports DNS names and semicolon-separated server lists in ROS_DISCOVERY_SERVER.  [oai_citation:6‡fast-dds.docs.eprosima.com](https://fast-dds.docs.eprosima.com/en/latest/fastdds/env_vars/env_vars.html)
            - name: ROS_DISCOVERY_SERVER
              value: "{{ include "ros2k8s.fullname" . }}-discovery-server:11811"

            - name: ROS_DOMAIN_ID
              value: {{ .Values.ros.env.ROS_DOMAIN_ID | quote }}

            # Ensure pods can communicate over the network
            - name: ROS_LOCALHOST_ONLY
              value: "0"

            # Use Fast DDS RMW explicitly
            - name: RMW_IMPLEMENTATION
              value: "rmw_fastrtps_cpp"

            # Default to UDPv4 only in Kubernetes unless you opt into SHM explicitly  [oai_citation:7‡fast-dds.docs.eprosima.com](https://fast-dds.docs.eprosima.com/en/latest/fastdds/env_vars/env_vars.html)
            - name: FASTDDS_BUILTIN_TRANSPORTS
              value: "UDPv4"

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ "ALL" ]
          resources:
  {{- toYaml .Values.ros.resources | nindent 12 }}