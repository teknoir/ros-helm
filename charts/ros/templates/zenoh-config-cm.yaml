{{- if .Values.zenohRouter.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-zenoh-config
  labels:
    app: {{ .Release.Name }}-zenoh-config
data:
  # Router config: loaded by the zenoh-router pod
  router.json5: |
    {
      mode: "router",
      listen: {
        endpoints: [
          "tcp/0.0.0.0:{{ .Values.zenohRouter.ports.zenoh }}",
          "ws/0.0.0.0:{{ .Values.zenohRouter.ports.websocket }}"
        ]
      },
      plugins: {
        // REST API: HTTP GET/PUT for pub/sub (useful for dashboards and integrations)
        rest: {
          http_port: {{ .Values.zenohRouter.ports.rest }}
        }
      }
    }
  # Client config: mounted into every standard ROS node pod
  client.json5: |
    {
      mode: "client",
      connect: {
        endpoints: ["tcp/{{ .Release.Name }}-zenoh-router:{{ .Values.zenohRouter.ports.zenoh }}"]
      }
    }
{{- end }}
