---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ros2k8s.fullname" . }}-discovery-server
  labels:
    app.kubernetes.io/name: {{ include "ros2k8s.fullname" . }}
    app.kubernetes.io/component: discovery-server
spec:
  replicas: {{ .Values.discoveryServer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ros2k8s.fullname" . }}
      app.kubernetes.io/component: discovery-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ros2k8s.fullname" . }}
        app.kubernetes.io/component: discovery-server
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: discovery-server
          image: {{ .Values.discoveryServer.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: udp-ds
              containerPort: 11811
              protocol: UDP
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ "ALL" ]
          resources:
  {{- toYaml .Values.discoveryServer.resources | nindent 12 }}