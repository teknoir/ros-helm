name: Build and Push

on:
  push:
    branches: ["**"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: kitti-bag
            context: docker/bags/kitti-bag
            file: docker/bags/kitti-bag/Dockerfile
            platforms: linux/amd64
          - name: nviros-humanoid-example
            context: docker/src/nviros-humanoid-example
            file: docker/src/nviros-humanoid-example/Dockerfile
            platforms: linux/amd64,linux/arm64/v8
          - name: tb3-headless-launch
            context: docker/src/tb3_headless_launch
            file: docker/src/tb3_headless_launch/Dockerfile
            platforms: linux/amd64,linux/arm64/v8
          - name: nviros
            context: docker
            file: docker/nviros.Dockerfile
            platforms: linux/amd64
          - name: ros2
            context: docker
            file: docker/ros2.Dockerfile
            platforms: linux/amd64,linux/arm64/v8
          - name: zenoh-router
            context: docker
            file: docker/zenoh-router.Dockerfile
            platforms: linux/amd64,linux/arm64/v8

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          IMAGE="${IMAGE_PREFIX}/${{ matrix.name }}"
          BRANCH="${GITHUB_REF_NAME}"
          SAFE_BRANCH="${BRANCH//\//-}"
          TIMESTAMP="$(date -u +%Y%m%d-%H%M%S)"
          TAGS="${IMAGE}:${SAFE_BRANCH}-${TIMESTAMP}"
          TAGS="${TAGS},${IMAGE}:${SAFE_BRANCH}"
          TAGS="${TAGS},${IMAGE}:sha-${GITHUB_SHA::8}"
          if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
